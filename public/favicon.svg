<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#1e2535"/>
  <!-- Outer white square (border only) — same as parent logo mark -->
  <rect x="5" y="5" width="22" height="22" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Clip streams to inner square area -->
  <clipPath id="c">
    <rect x="7.25" y="7.25" width="17.5" height="17.5"/>
  </clipPath>
  <g clip-path="url(#c)">
    <!-- Stream 1: shallow downward flow -->
    <line x1="2" y1="12" x2="30" y2="20" stroke="#5bbf9f" stroke-width="7" stroke-linecap="butt"/>
    <!-- Stream 2: shallow upward flow — clashes at center -->
    <line x1="2" y1="20" x2="30" y2="12" stroke="#5bbf9f" stroke-width="7" stroke-linecap="butt" opacity="0.6"/>
  </g>
</svg>
